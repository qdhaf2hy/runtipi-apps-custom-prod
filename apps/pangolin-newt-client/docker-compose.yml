services:
  pangolin-newt-client:
    container_name: pangolin-newt-client
    image: fosrl/newt:1.12.2
    restart: always
    network_mode: host
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    networks:
      - tipi_main_network
    labels:
      runtipi.managed: true